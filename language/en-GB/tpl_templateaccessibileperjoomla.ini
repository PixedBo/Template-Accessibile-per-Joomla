; ========================================================
; SERVICE CARD - BACKEND (templateDetails.xml)
; ========================================================
TPL_ACCESSIBILE_SCHEDA_SERVIZIO_NOTE_LABEL="Service Card (C.SI.1.3)"
TPL_ACCESSIBILE_SCHEDA_SERVIZIO_NOTE_DESC="Map Joomla Custom Fields to the Service Card elements (C.SI.1.3). Go to <strong>Components &rarr; Fields</strong>, create a group for services and add the following fields (context: Article):<br><br><strong>1. Service status</strong> &mdash; type <em>Text</em> (e.g. &laquo;Active&raquo;)<br><strong>2. A chi &egrave; rivolto</strong> &mdash; type <em>Editor</em><br><strong>3. Come fare</strong> &mdash; type <em>Editor</em><br><strong>4. Cosa serve</strong> &mdash; type <em>Editor</em><br><strong>5. Cosa si ottiene</strong> &mdash; type <em>Editor</em><br><strong>6. Tempi e scadenze</strong> &mdash; type <em>Textarea</em><br><strong>7. Quanto costa</strong> &mdash; type <em>Editor</em> or <em>Textarea</em><br><strong>8. Accedi al servizio (text)</strong> &mdash; type <em>Textarea</em><br><strong>9. Online access URL</strong> &mdash; type <em>URL</em><br><strong>10. Appointment booking URL</strong> &mdash; type <em>URL</em><br><strong>11. Service conditions URL</strong> &mdash; type <em>URL</em><br><strong>12. Contacts - organisational unit</strong> &mdash; type <em>Editor</em> or <em>Textarea</em><br><br>Once created, select each field from the corresponding dropdown below."
TPL_ACCESSIBILE_CF_STATO_LABEL="Field: Service status"
TPL_ACCESSIBILE_CF_STATO_DESC="Custom field indicating service status (e.g. text: Active / Inactive). Maps to data-element=service-status."
TPL_ACCESSIBILE_CF_A_CHI_RIVOLTO_LABEL="Field: Who it is for"
TPL_ACCESSIBILE_CF_A_CHI_RIVOLTO_DESC="Custom field with the text for the A chi è rivolto section (service-addressed). Recommended: Editor or Textarea type."
TPL_ACCESSIBILE_CF_COME_FARE_LABEL="Field: How to"
TPL_ACCESSIBILE_CF_COME_FARE_DESC="Custom field with the text for the Come fare section (service-how-to). Recommended: Editor or Textarea type."
TPL_ACCESSIBILE_CF_COSA_SERVE_LABEL="Field: What you need"
TPL_ACCESSIBILE_CF_COSA_SERVE_DESC="Custom field with the text for the Cosa serve section (service-needed). Recommended: Editor or Textarea type."
TPL_ACCESSIBILE_CF_COSA_SI_OTTIENE_LABEL="Field: What you get"
TPL_ACCESSIBILE_CF_COSA_SI_OTTIENE_DESC="Custom field with the text for the Cosa si ottiene section (service-achieved). Recommended: Editor or Textarea type."
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LABEL="Field: Deadlines (text)"
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_DESC="Custom field with descriptive text for deadlines (service-calendar-text). Recommended: Textarea type."
TPL_ACCESSIBILE_TEMPI_LISTA_NOTE_LABEL="Deadlines list - visual calendar (service-calendar-list)"
TPL_ACCESSIBILE_TEMPI_LISTA_NOTE_DESC="To use the visual calendar, create a <strong>Subform</strong> custom field in Components &rarr; Fields, then select it below.<br><br>The Subform needs 5 sub-fields. The <strong>default names</strong> are shown in brackets: you can use them as-is or override them in the mapping fields below.<br><ul><li><strong>titolo</strong> (Text) &mdash; row heading, required</li><li><strong>data</strong> (Calendar) &mdash; for fixed-date deadlines</li><li><strong>numero</strong> (Text) &mdash; for durations e.g. 20</li><li><strong>unita</strong> (Text) &mdash; duration unit e.g. giorni, mesi</li><li><strong>descrizione</strong> (Textarea) &mdash; descriptive text, optional</li></ul>Fill in <strong>data</strong> OR <strong>numero + unita</strong> per row: the template auto-detects the mode."
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LISTA_LABEL="Subform field: Deadlines list"
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LISTA_DESC="Select the Subform-type custom field created for the visual deadlines calendar (service-calendar-list)."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_TITOLO_LABEL="Sub-field: row title"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_TITOLO_DESC="Select the field whose technical name [in brackets] matches the Subform sub-field that holds the row title. The Subform sub-field must have the same name."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DATA_LABEL="Sub-field: fixed date"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DATA_DESC="Select the field whose technical name matches the Subform sub-field holding the date (Calendar type). Used in calendar mode."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_NUMERO_LABEL="Sub-field: number of days/months"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_NUMERO_DESC="Select the field whose technical name matches the Subform sub-field holding the number (e.g. 20). Used in duration mode."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_UNITA_LABEL="Sub-field: duration unit"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_UNITA_DESC="Select the field whose technical name matches the Subform sub-field holding the unit (e.g. giorni, mesi). Used in duration mode."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DESCRIZIONE_LABEL="Sub-field: descriptive text"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DESCRIZIONE_DESC="Select the field whose technical name matches the Subform sub-field holding the optional descriptive text."
TPL_ACCESSIBILE_CF_QUANTO_COSTA_LABEL="Field: Cost"
TPL_ACCESSIBILE_CF_QUANTO_COSTA_DESC="Custom field with the text for the Quanto costa section (service-cost). Recommended: Editor or Textarea type."
