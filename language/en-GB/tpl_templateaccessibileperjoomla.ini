TPL_ACCESSIBILE_CF_ACCEDI_ONLINE_DESC="URL of the online service portal (service-online-access). Use a URL-type custom field."
TPL_ACCESSIBILE_CF_ACCEDI_ONLINE_TESTO_LABEL="Field: Online access button label"
