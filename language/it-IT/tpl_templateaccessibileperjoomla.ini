; ========================================================
; SCHEDA SERVIZIO - BACKEND (templateDetails.xml)
; ========================================================
TPL_ACCESSIBILE_SCHEDA_SERVIZIO_NOTE_LABEL="Scheda Servizio (C.SI.1.3)"
TPL_ACCESSIBILE_SCHEDA_SERVIZIO_NOTE_DESC="Associa i Custom Field di Joomla agli elementi della Scheda Servizio (C.SI.1.3). Vai in <strong>Componenti &rarr; Campi</strong>, crea un gruppo per i servizi e aggiungi i seguenti campi (context: Articolo):<br><br><strong>1. Stato del servizio</strong> &mdash; tipo <em>Testo</em> (es. &laquo;Attivo&raquo;)<br><strong>2. A chi &egrave; rivolto</strong> &mdash; tipo <em>Editor</em><br><strong>3. Come fare</strong> &mdash; tipo <em>Editor</em><br><strong>4. Cosa serve</strong> &mdash; tipo <em>Editor</em><br><strong>5. Cosa si ottiene</strong> &mdash; tipo <em>Editor</em><br><strong>6. Tempi e scadenze</strong> &mdash; tipo <em>Textarea</em><br><strong>7. Quanto costa</strong> &mdash; tipo <em>Editor</em> o <em>Textarea</em><br><strong>8. Accedi al servizio (testo)</strong> &mdash; tipo <em>Textarea</em><br><strong>9. URL accesso online</strong> &mdash; tipo <em>URL</em><br><strong>10. URL prenotazione appuntamento</strong> &mdash; tipo <em>URL</em><br><strong>11. URL condizioni di servizio</strong> &mdash; tipo <em>URL</em><br><strong>12. Contatti - unit&agrave; organizzativa</strong> &mdash; tipo <em>Editor</em> o <em>Textarea</em><br><br>Una volta creati, seleziona ciascun campo nel menu a tendina corrispondente qui sotto."
TPL_ACCESSIBILE_CF_STATO_LABEL="Campo: Stato del servizio"
TPL_ACCESSIBILE_CF_STATO_DESC="Custom field che indica lo stato del servizio (es. testo: Attivo / Non attivo). Corrisponde a data-element=service-status."
TPL_ACCESSIBILE_CF_A_CHI_RIVOLTO_LABEL="Campo: A chi è rivolto"
TPL_ACCESSIBILE_CF_A_CHI_RIVOLTO_DESC="Custom field con il testo della sezione A chi è rivolto (service-addressed). Consigliato: tipo Editor o Textarea."
TPL_ACCESSIBILE_CF_COME_FARE_LABEL="Campo: Come fare"
TPL_ACCESSIBILE_CF_COME_FARE_DESC="Custom field con il testo della sezione Come fare (service-how-to). Consigliato: tipo Editor o Textarea."
TPL_ACCESSIBILE_CF_COSA_SERVE_LABEL="Campo: Cosa serve"
TPL_ACCESSIBILE_CF_COSA_SERVE_DESC="Custom field con il testo della sezione Cosa serve (service-needed). Consigliato: tipo Editor o Textarea."
TPL_ACCESSIBILE_CF_COSA_SI_OTTIENE_LABEL="Campo: Cosa si ottiene"
TPL_ACCESSIBILE_CF_COSA_SI_OTTIENE_DESC="Custom field con il testo della sezione Cosa si ottiene (service-achieved). Consigliato: tipo Editor o Textarea."
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LABEL="Campo: Tempi e scadenze (testo)"
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_DESC="Custom field con il testo descrittivo dei tempi (service-calendar-text). Consigliato: tipo Textarea."
TPL_ACCESSIBILE_TEMPI_LISTA_NOTE_LABEL="Lista scadenze - calendario visuale (service-calendar-list)"
TPL_ACCESSIBILE_TEMPI_LISTA_NOTE_DESC="Per usare il calendario visuale crea un campo di tipo <strong>Subform</strong> in Componenti &rarr; Campi, poi selezionalo qui sotto.<br><br>Il Subform deve avere 5 sotto-campi. I <strong>nomi di default</strong> sono indicati tra parentesi: puoi usarli cos&igrave; come sono oppure personalizzarli nei campi di mapping qui sotto.<br><ul><li><strong>titolo</strong> (Text) &mdash; titolo della riga, obbligatorio</li><li><strong>data</strong> (Calendar) &mdash; per scadenze con data fissa</li><li><strong>numero</strong> (Text) &mdash; per durate es. 20</li><li><strong>unita</strong> (Text) &mdash; unit&agrave; della durata es. giorni, mesi</li><li><strong>descrizione</strong> (Textarea) &mdash; testo descrittivo, opzionale</li></ul>Per ogni riga compila <strong>data</strong> oppure <strong>numero + unita</strong>: il template rileva la modalit&agrave; automaticamente."
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LISTA_LABEL="Campo Subform: Lista scadenze"
TPL_ACCESSIBILE_CF_TEMPI_SCADENZE_LISTA_DESC="Seleziona il campo aggiuntivo di tipo Subform creato per il calendario visuale delle scadenze (service-calendar-list)."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_TITOLO_LABEL="Sotto-campo: titolo della riga"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_TITOLO_DESC="Seleziona il campo il cui nome tecnico [tra parentesi] corrisponde al sotto-campo Subform che contiene il titolo. Il sotto-campo del Subform deve avere lo stesso nome."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DATA_LABEL="Sotto-campo: data fissa"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DATA_DESC="Seleziona il campo il cui nome tecnico corrisponde al sotto-campo Subform che contiene la data (tipo Calendar). Usato per la modalit&agrave; calendario."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_NUMERO_LABEL="Sotto-campo: numero di giorni/mesi"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_NUMERO_DESC="Seleziona il campo il cui nome tecnico corrisponde al sotto-campo Subform che contiene il numero (es. 20). Usato per la modalit&agrave; durata."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_UNITA_LABEL="Sotto-campo: unit&agrave; di durata"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_UNITA_DESC="Seleziona il campo il cui nome tecnico corrisponde al sotto-campo che contiene l'unit&agrave; (es. giorni, mesi). Usato per la modalit&agrave; durata."
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DESCRIZIONE_LABEL="Sotto-campo: testo descrittivo"
TPL_ACCESSIBILE_CF_TEMPI_LISTA_KEY_DESCRIZIONE_DESC="Seleziona il campo il cui nome tecnico corrisponde al sotto-campo Subform che contiene il testo descrittivo opzionale."
TPL_ACCESSIBILE_CF_QUANTO_COSTA_LABEL="Campo: Quanto costa"
TPL_ACCESSIBILE_CF_QUANTO_COSTA_DESC="Custom field con il testo della sezione Quanto costa (service-cost). Consigliato: tipo Editor o Textarea."
